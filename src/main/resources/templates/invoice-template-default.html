<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        body { font-family: Arial; padding: 30px; font-size: 14px; }
        .title { font-size: 24px; font-weight: bold; }
        .right { text-align: right; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { border: 1px solid #ccc; padding: 8px; }
        .table th { background: #f2f2f2; }
    </style>
</head>
<body>
<div class="title">Invoice # [[${invoice.invoiceNumber}]]</div>
<p>Date: [[${invoice.invoiceDate}]] | Due: [[${invoice.dueDate}]]</p>

<p><strong>From:</strong><br>[[${invoice.billingFrom}]]</p>
<p><strong>To:</strong><br>[[${invoice.billingTo}]]</p>

<table class="table">
    <thead>
    <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${invoice.items}">
        <td th:text="${item.description}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.total}"></td>
    </tr>
    </tbody>
</table>

<p class="right"><strong>Total: [[${invoice.totalAmount}]]</strong></p>
<p class="right">Status: [[${invoice.status}]]</p>
</body>
</html>
