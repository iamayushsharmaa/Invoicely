<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Invoice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            padding: 35px;
            background: #f0f4fc;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }
        .header {
            background: #2a2a72;
            color: #fff;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
        }
        .logo {
            max-width: 110px;
            height: auto;
            margin-right: 15px;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin: 25px 0;
            padding: 0 15px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .table th {
            background: #2a2a72;
            color: #fff;
            font-weight: 600;
        }
        .table td {
            background: #f9f9f9;
        }
        .summary {
            text-align: right;
            margin-top: 25px;
            font-size: 16px;
            font-weight: 600;
            color: #2a2a72;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img th:if="${invoice.logoUrl != null}" th:src="${invoice.logoUrl}" alt="Company Logo" class="logo"/>
        <div class="title">Invoice #[[${invoice.invoiceNumber}]]</div>
    </div>
    <div class="details">
        <div>
            <p><strong>From:</strong><br/>[[${invoice.billingFrom}]]</p>
            <p><strong>To:</strong><br/>[[${invoice.billingTo}]]</p>
        </div>
        <div>
            <p>Date: [[${invoice.invoiceDate}]]<br/>Due: [[${invoice.dueDate}]]</p>
        </div>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>Description</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${invoice.items}">
            <td th:text="${item.description}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.price}"></td>
            <td th:text="${item.total}"></td>
        </tr>
        </tbody>
    </table>
    <div class="summary">
        <p>Total: [[${invoice.totalAmount}]]</p>
        <p>Status: [[${invoice.status}]]</p>
    </div>
</div>
</body>
</html>
