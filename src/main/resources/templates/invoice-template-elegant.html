<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Invoice</title>
    <style>
        body {
          font-family: Arial, sans-serif;
            padding: 50px;
            font-size: 14px;
            background: #f5f5f5;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            max-width: 120px;
            height: auto;
            margin: 0 auto 10px;
            display: block;
        }
        .title {
            font-size: 30px;
            font-weight: bold;
            color: #2e2e2e;
            margin: 10px 0;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border: 1px solid #2e2e2e;
        }
        .table th, .table td {
            border: 1px solid #2e2e2e;
            padding: 10px;
            text-align: left;
        }
        .table th {
            background: #2e2e2e;
            color: #fff;
        }
        .table td {
            background: #fff;
        }
        .footer {
            text-align: right;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="header">
    <img th:if="${invoice.logoUrl != null}" th:src="${invoice.logoUrl}" alt="Company Logo" class="logo"/>
    <div class="title">Invoice # [[${invoice.invoiceNumber}]]</div>
</div>
<div class="details">
    <div>
        <p><strong>From:</strong><br/>[[${invoice.billingFrom}]]</p>
    </div>
    <div>
        <p>Date: [[${invoice.invoiceDate}]]<br/>Due: [[${invoice.dueDate}]]</p>
    </div>
</div>
<p><strong>To:</strong><br/>[[${invoice.billingTo}]]</p>

<table class="table">
    <thead>
    <tr>
        <th>Description</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${invoice.items}">
        <td th:text="${item.description}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.total}"></td>
    </tr>
    </tbody>
</table>

<div class="footer">
    <p>Total: [[${invoice.totalAmount}]]</p>
    <p>Status: [[${invoice.status}]]</p>
</div>
</body>
</html>
