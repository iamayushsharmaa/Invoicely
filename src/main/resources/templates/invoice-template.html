<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        @page {
            size: A4;
            margin: 25mm 20mm 25mm 20mm;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333;
            margin: 0;
            padding: 0;
            width: 100%;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10mm;
        }
        .section {
            margin-bottom: 5mm;
        }
        .section strong {
            display: inline-block;
            width: 30mm;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6mm;
            font-size: 11px;
        }
        th {
            background-color: #f2f2f2;
            text-align: left;
        }
        th, td {
            padding: 4mm;
            border: 0.5px solid #999;
        }
        .total {
            margin-top: 5mm;
            text-align: right;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="title">Invoice #<span th:text="${invoice.invoiceNumber}"></span></div>

<div class="section">
    <div><strong>Billing From:</strong> <span th:text="${invoice.billingFrom}"></span></div>
    <div><strong>Billing To:</strong> <span th:text="${invoice.billingTo}"></span></div>
</div>

<div class="section">
    <div><strong>Date:</strong> <span th:text="${invoice.invoiceDate}"></span></div>
    <div><strong>Due:</strong> <span th:text="${invoice.dueDate}"></span></div>
</div>

<table>
    <thead>
    <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${invoice.items}">
        <td th:text="${item.description}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.unitPrice}"></td>
        <td th:text="${item.total}"></td>
    </tr>
    </tbody>
</table>

<div class="total">
    Total Amount: <span th:text="${invoice.totalAmount}"></span>
</div>

</body>
</html>
